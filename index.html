<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Coish.Net">
  <title>Coish.Net</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="scene" aria-label="Coish.Net">
    <div class="vignette" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <div class="composition">
      <!-- Cobblestone street -->
      <div class="ground-wrap">
        <div class="ground" id="ground">
          <svg class="cobbles" aria-hidden="true">
            <defs>
              <pattern id="cobble" x="0" y="0" width="52" height="34" patternUnits="userSpaceOnUse">
                <rect width="52" height="34" fill="#14100c"/>
                <ellipse cx="14" cy="11" rx="12" ry="8" fill="#252018"/>
                <ellipse cx="38" cy="15" rx="13" ry="9" fill="#201a14"/>
                <ellipse cx="26" cy="27" rx="14" ry="8" fill="#2a221a"/>
                <ellipse cx="8" cy="26" rx="10" ry="7" fill="#1c1610"/>
                <ellipse cx="44" cy="28" rx="11" ry="7" fill="#181410"/>
                <path d="M2 6 Q14 4 26 7" stroke="#0a0806" stroke-width="0.7" fill="none" opacity="0.45"/>
                <path d="M30 2 Q42 0 50 5" stroke="#0a0806" stroke-width="0.7" fill="none" opacity="0.45"/>
              </pattern>
              <radialGradient id="litGround" cx="50%" cy="18%" r="72%">
                <stop offset="0%" stop-color="#d4a855" stop-opacity="0.62"/>
                <stop offset="35%" stop-color="#8a6838" stop-opacity="0.38"/>
                <stop offset="70%" stop-color="#3d2e1c" stop-opacity="0.12"/>
                <stop offset="100%" stop-color="#14100c" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <rect width="100%" height="100%" fill="url(#cobble)"/>
            <rect width="100%" height="100%" fill="url(#litGround)" class="ground-lit" id="ground-lit"/>
          </svg>
          <!-- Lamp base plate bolted to the stones -->
          <div class="post-base" aria-hidden="true"></div>
          <p class="shadow-text" id="shadow-text">Coish.Net</p>
        </div>
      </div>

      <!-- Light pool from lantern down onto the street -->
      <div class="light-cone" id="light-cone" aria-hidden="true"></div>

      <!-- Victorian post-top gas lamp -->
      <div class="lamp-stand">
        <svg class="lamp" viewBox="0 0 200 560" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="iron" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#121212"/>
              <stop offset="30%" stop-color="#3a3a3a"/>
              <stop offset="50%" stop-color="#2c2c2c"/>
              <stop offset="100%" stop-color="#0e0e0e"/>
            </linearGradient>
            <linearGradient id="ironVert" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#444"/>
              <stop offset="50%" stop-color="#222"/>
              <stop offset="100%" stop-color="#111"/>
            </linearGradient>
            <radialGradient id="glow" cx="50%" cy="70%" r="55%">
              <stop offset="0%" stop-color="#fffce8"/>
              <stop offset="30%" stop-color="#ffe082"/>
              <stop offset="65%" stop-color="#e8941a"/>
              <stop offset="100%" stop-color="#5c3010"/>
            </radialGradient>
            <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
              <feGaussianBlur stdDeviation="3"/>
            </filter>
          </defs>

          <!-- Finial -->
          <circle cx="100" cy="28" r="7" fill="#1a1a1a"/>
          <rect x="97" y="28" width="6" height="10" fill="url(#ironVert)"/>
          <!-- Lantern roof -->
          <polygon points="100,38 132,58 132,72 68,72 68,58" fill="#222"/>
          <polygon points="100,38 118,52 118,62 82,62 82,52" fill="#333"/>
          <!-- Hex lantern frame -->
          <polygon points="100,72 138,92 138,148 100,168 62,148 62,92" fill="none" stroke="#2a2a2a" stroke-width="5"/>
          <polygon points="100,72 138,92 138,148 100,168 62,148 62,92" fill="#141414"/>
          <!-- Glass panels -->
          <polygon points="100,78 132,94 132,142 100,158" fill="url(#glow)" opacity="0.88" class="lantern-glass"/>
          <polygon points="100,78 68,94 68,142 100,158" fill="url(#glow)" opacity="0.88" class="lantern-glass"/>
          <polygon points="100,78 132,94 100,110 68,94" fill="url(#glow)" opacity="0.75" class="lantern-glass"/>
          <polygon points="100,158 132,142 100,126 68,142" fill="url(#glow)" opacity="0.75" class="lantern-glass"/>
          <!-- Flame -->
          <ellipse cx="100" cy="118" rx="10" ry="18" fill="url(#glow)" filter="url(#softGlow)" class="flame"/>
          <ellipse cx="100" cy="114" rx="5" ry="10" fill="#fffef0" opacity="0.92" class="flame-core"/>
          <!-- Lantern base ring -->
          <ellipse cx="100" cy="168" rx="42" ry="8" fill="#1f1f1f"/>
          <rect x="78" y="168" width="44" height="14" rx="2" fill="url(#ironVert)"/>
          <!-- Ornamental bulb -->
          <path d="M88 182 Q100 198 112 182 L110 210 Q100 218 90 210 Z" fill="url(#iron)"/>
          <ellipse cx="100" cy="182" rx="14" ry="5" fill="#333"/>
          <!-- Upper collar -->
          <rect x="82" y="218" width="36" height="10" rx="2" fill="#2a2a2a"/>
          <ellipse cx="100" cy="218" rx="20" ry="5" fill="#383838"/>
          <!-- Main post shaft -->
          <rect x="91" y="228" width="18" height="250" fill="url(#iron)"/>
          <rect x="94" y="240" width="4" height="230" fill="#4a4a4a" opacity="0.25"/>
          <!-- Mid decorative ring -->
          <rect x="78" y="340" width="44" height="12" rx="3" fill="#2e2e2e"/>
          <ellipse cx="100" cy="340" rx="24" ry="6" fill="#404040"/>
          <!-- Lower shaft -->
          <rect x="89" y="352" width="22" height="130" fill="url(#ironVert)"/>
          <!-- Scroll base -->
          <path d="M72 482 Q72 468 88 464 L112 464 Q128 468 128 482 L124 494 Q100 502 76 494 Z" fill="#222"/>
          <ellipse cx="100" cy="464" rx="30" ry="7" fill="#333"/>
          <!-- Ground flange -->
          <ellipse cx="100" cy="502" rx="48" ry="10" fill="#1a1a1a"/>
          <ellipse cx="100" cy="500" rx="40" ry="7" fill="#282828"/>
          <ellipse cx="100" cy="512" rx="52" ry="12" fill="#0a0a0a"/>
        </svg>
        <div class="lamp-halo" id="lamp-halo" aria-hidden="true"></div>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
